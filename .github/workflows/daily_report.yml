name: Daily Dividend Report

on:
  schedule:
    # 盘中收盘 11:30 CST = 03:30 UTC
    - cron: '30 3 * * 1-5'
    # A股收盘 15:30 CST = 07:30 UTC（延迟30分钟确保数据更新）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Fetch and push dividend report
        env:
          JISILU_COOKIE: ${{ secrets.JISILU_COOKIE }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python main.py

      - name: Fetch and push CB report
        env:
          JISILU_COOKIE: ${{ secrets.JISILU_COOKIE }}
          CB_WECHAT_WEBHOOK: ${{ secrets.CB_WECHAT_WEBHOOK }}
          IRM_WECHAT_WEBHOOK: ${{ secrets.IRM_WECHAT_WEBHOOK }}
        run: python cb_main.py
